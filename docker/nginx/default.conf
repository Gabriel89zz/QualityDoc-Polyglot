server {
    listen 80;
    server_name localhost;

    # --- AUDITORÍA (PHP Laravel) ---
    # Lo ponemos arriba porque es la raíz principal
    location / {
        root /var/www/html/public;
        index index.php;
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        root /var/www/html/public;
        fastcgi_pass php-app:9000; # PHP-FPM habla por el 9000
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # --- ADMINISTRADOR (.NET Core 10) ---
    # IMPORTANTE: Asegúrate de poner la barra / al final de admin/
    location /admin/ {
        # IMPORTANTE: La barra / al final de 8080/ corta el "/admin"
        # para que a C# le llegue la ruta limpia.
        proxy_pass http://dotnet-app:8080/; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- BÚSQUEDA (FastAPI) ---
    location /api/search/ {
        # Pasa lo mismo aquí, ponemos la barra al final para limpiar la ruta
        proxy_pass http://python-app:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}